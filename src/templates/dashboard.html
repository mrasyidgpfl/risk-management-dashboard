<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Management Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <style>
        /* ---------- Tokens ---------- */
        :root {
            --bg-base: #0f1117;
            --bg-surface: #161a25;
            --bg-elevated: #1e2230;
            --border: #2a2e3a;
            --border-subtle: #1e2230;

            --text-primary: #e0e0e0;
            --text-muted: #9ca3af;
            --text-dim: #6b7280;

            --positive: #4ade80;
            --negative: #f87171;
            --accent: #6366f1;

            --radius: 8px;
            --radius-sm: 6px;
            --gap: 12px;
            --pad: 16px;

            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-num: tabular-nums;
        }

        .mb-gap { margin-bottom: var(--gap); }

        /* ---------- Reset ---------- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-base);
            color: var(--text-primary);
        }

        /* ---------- Header ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--pad) 24px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 18px; font-weight: 600; }

        .status { font-size: 13px; color: var(--positive); }
        .status.disconnected { color: var(--negative); }

        /* ---------- Layout ---------- */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap);
            padding: var(--pad);
        }
        .full-width { grid-column: 1 / -1; }

        /* ---------- Card ---------- */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--pad);
        }
        .card-title {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: var(--gap);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ---------- Metric tiles ---------- */
        .metrics-row {
            display: flex;
            gap: var(--pad);
            margin-bottom: var(--pad);
        }
        .metric {
            flex: 1;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--pad);
        }
        .metric-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .metric-value {
            margin-top: 4px;
            font-size: 24px;
            font-weight: 700;
            font-variant-numeric: var(--font-num);
        }

        /* ---------- PnL colour semantics ---------- */
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }

        /* ---------- Table ---------- */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            padding: 8px;
            text-align: left;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 8px;
            border-bottom: 1px solid var(--border-subtle);
            font-variant-numeric: var(--font-num);
        }

        /* ---------- Ticker ---------- */
        .ticker { display: flex; gap: var(--gap); flex-wrap: wrap; }
        .ticker-item {
            min-width: 160px;
            padding: 8px 12px;
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
            font-size: 13px;
        }
        .ticker-pair { font-weight: 600; margin-bottom: 4px; }
        .ticker-prices {
            display: flex;
            gap: var(--gap);
            font-variant-numeric: var(--font-num);
        }
        .ticker-spread { color: var(--text-dim); font-size: 11px; }
        .bid { color: var(--negative); }
        .ask { color: var(--positive); }

        /* ---------- Chart containers ---------- */
        .plot { height: 300px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Risk Management Dashboard</h1>
        <div class="status disconnected" id="status">Connecting...</div>
    </div>

    <div style="padding: 16px;">
        <div class="metrics-row" id="top-metrics">
            <div class="metric">
                <div class="metric-label">Total PnL</div>
                <div class="metric-value" id="total-pnl">-</div>
            </div>
            <div class="metric">
                <div class="metric-label">Monetisation</div>
                <div class="metric-value" id="monetisation">-</div>
            </div>
            <div class="metric">
                <div class="metric-label">Unrealised PnL</div>
                <div class="metric-value" id="unrealised-pnl">-</div>
            </div>
            <div class="metric">
                <div class="metric-label">Realised PnL</div>
                <div class="metric-value" id="realised-pnl">-</div>
            </div>
            <div class="metric">
                <div class="metric-label">Total Trades</div>
                <div class="metric-value" id="total-trades">-</div>
            </div>
        </div>

        <div class="card full-width mb-gap">
            <div class="card-title">Live Prices</div>
            <div class="ticker" id="ticker"></div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-title">PnL Curve</div>
                <div class="plot" id="pnl-chart"></div>
            </div>
            <div class="card">
                <div class="card-title">Net Exposure by Instrument</div>
                <div class="plot" id="exposure-chart"></div>
            </div>
            <div class="card">
                <div class="card-title">PnL Attribution by Instrument</div>
                <div class="plot" id="attribution-chart"></div>
            </div>
            <div class="card">
                <div class="card-title">Client Metrics</div>
                <div id="client-table-container">
                    <table>
                        <thead>
                        <tr><th>Client</th><th>Trades</th><th>Volume</th><th>Spread Captured</th><th>Yield (bps)</th><th>Realised PnL</th></tr>                        </thead>
                        <tbody id="client-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const css = getComputedStyle(document.documentElement);
        const colors = {
            muted: css.getPropertyValue('--text-muted').trim(),
            borderSubtle: css.getPropertyValue('--border-subtle').trim(),
            border: css.getPropertyValue('--border').trim(),
            accent: css.getPropertyValue('--accent').trim(),
            positive: css.getPropertyValue('--positive').trim(),
            negative: css.getPropertyValue('--negative').trim(),
        };

        const plotLayout = {
            paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
            font: { color: '#9ca3af', size: 11 },
            margin: { l: 50, r: 20, t: 10, b: 40 },
            xaxis: { gridcolor: '#1e2230', linecolor: '#2a2e3a' },
            yaxis: { gridcolor: '#1e2230', linecolor: '#2a2e3a' },
        };

        Plotly.newPlot('pnl-chart', [{ x: [], y: [], type: 'scatter', mode: 'lines', line: { color: '#6366f1', width: 2 }, name: 'Total PnL' }], { ...plotLayout }, { responsive: true, displayModeBar: false });
        Plotly.newPlot('exposure-chart', [{ x: [], y: [], type: 'bar', marker: { color: [] } }], { ...plotLayout }, { responsive: true, displayModeBar: false });
        Plotly.newPlot('attribution-chart', [
                    { x: [], y: [], type: 'bar', name: 'Monetisation', marker: { color: colors.positive } },
                    { x: [], y: [], type: 'bar', name: 'Inventory PnL', marker: { color: colors.accent } },
                ], { ...plotLayout, barmode: 'relative', showlegend: true, legend: { orientation: 'h', y: 1.1 } },
                { responsive: true, displayModeBar: false });

        function formatNum(n, decimals = 2) {
            return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        }

        function pnlClass(val) { return val >= 0 ? 'positive' : 'negative'; }
        function pnlSign(val) { return val >= 0 ? '+' : ''; }

        function connect() {
            const ws = new WebSocket(`ws://${location.host}/ws`);
            const statusEl = document.getElementById('status');

            ws.onopen = () => { statusEl.textContent = 'Live'; statusEl.className = 'status'; };
            ws.onclose = () => { statusEl.textContent = 'Disconnected'; statusEl.className = 'status disconnected'; setTimeout(connect, 2000); };
            ws.onerror = () => ws.close();

            ws.onmessage = (event) => {
                const d = JSON.parse(event.data);

                // Top metrics
                document.getElementById('total-pnl').innerHTML = `<span class="${pnlClass(d.total_pnl)}">${pnlSign(d.total_pnl)}${formatNum(d.total_pnl)}</span>`;
                document.getElementById('monetisation').innerHTML = `<span class="positive">+${formatNum(d.total_monetisation)}</span>`;
                document.getElementById('unrealised-pnl').innerHTML = `<span class="${pnlClass(d.total_unrealised_pnl)}">${pnlSign(d.total_unrealised_pnl)}${formatNum(d.total_unrealised_pnl)}</span>`;
                document.getElementById('realised-pnl').innerHTML = `<span class="${pnlClass(d.total_realised_pnl)}">${pnlSign(d.total_realised_pnl)}${formatNum(d.total_realised_pnl)}</span>`;
                const totalTrades = Object.values(d.positions).reduce((sum, p) => sum + p.trade_count, 0);
                document.getElementById('total-trades').textContent = totalTrades;

                // Ticker
                const tickerEl = document.getElementById('ticker');
                tickerEl.innerHTML = Object.values(d.latest_ticks).map(t => `
                    <div class="ticker-item">
                        <div class="ticker-pair">${t.instrument}</div>
                        <div class="ticker-prices">
                            <span class="bid">${t.bid.toFixed(5)}</span>
                            <span class="ask">${t.ask.toFixed(5)}</span>
                            <span class="ticker-spread">${t.spread < 0.01 ? t.spread.toFixed(4) : t.spread.toFixed(2)}</span>
                        </div>
                    </div>
                `).join('');

                // PnL curve
                const pnlX = d.pnl_history.map(p => p.time);
                const pnlY = d.pnl_history.map(p => p.pnl);
                Plotly.react('pnl-chart', [{ x: pnlX, y: pnlY, type: 'scatter', mode: 'lines', line: { color: '#6366f1', width: 2 }, name: 'Total PnL' }], { ...plotLayout }, { responsive: true, displayModeBar: false });

                // Exposure
                const instruments = Object.keys(d.positions);
                const exposures = instruments.map(i => d.positions[i].net_quantity);
                const expColors = exposures.map(e => e >= 0 ? '#4ade80' : '#f87171');
                Plotly.react('exposure-chart', [{ x: instruments, y: exposures, type: 'bar', marker: { color: expColors } }], { ...plotLayout, xaxis: { ...plotLayout.xaxis, type: 'category' } }, { responsive: true, displayModeBar: false });

                // Attribution: Total PnL = Monetisation (spread) + Inventory PnL (mark-to-market)
                const monetisationByInst = instruments.map(i => d.positions[i].monetisation);
                const inventoryByInst = instruments.map(i =>
                    d.positions[i].total_pnl - d.positions[i].monetisation
                );
                Plotly.react('attribution-chart', [
                    { x: instruments, y: monetisationByInst, type: 'bar', name: 'Monetisation',
                      marker: { color: colors.positive } },
                    { x: instruments, y: inventoryByInst, type: 'bar', name: 'Inventory PnL',
                      marker: { color: inventoryByInst.map(v => v >= 0 ? colors.positive : colors.negative) } },
                ], { ...plotLayout, barmode: 'relative', xaxis: { ...plotLayout.xaxis, type: 'category' },
                     showlegend: true, legend: { orientation: 'h', y: 1.1 } },
                { responsive: true, displayModeBar: false });

                // Client table
                const tbody = document.getElementById('client-table');
                tbody.innerHTML = Object.values(d.client_metrics)
                    .sort((a, b) => b.total_volume - a.total_volume)
                    .map(c => `<tr>
                        <td>${c.client}</td>
                        <td>${c.trade_count}</td>
                        <td>${formatNum(c.total_volume)}</td>
                        <td>${formatNum(c.total_spread_paid, 4)}</td>
                        <td>${formatNum(c.yield_bps, 1)}</td>
                        <td><span class="${pnlClass(d.pnl_per_client[c.client] || 0)}">${pnlSign(d.pnl_per_client[c.client] || 0)}${formatNum(d.pnl_per_client[c.client] || 0)}</span></td>
                    </tr>`).join('');
            };
        }

        connect();
    </script>
</body>
</html>
